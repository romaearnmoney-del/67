<style>

 body {
      margin: 0;  /*отступ */
      min-height: 100vh; /*масштаб на всю страницу */
      background: conic-gradient(#ef4444, #facc15, #22c55e, #3b82f6, #ef4444);
    }

body {
            margin: 0;
            background-color: #f2f2f2; /* серый цвет по бокам */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;

        }
    
</head>





/* MAIN WHITE BOX */
.container{
    max-width:1200px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */
h1{
    text-align:center;
    font-size:50px;
    margin-bottom:40px;
}

/* LEFT IMAGE + RIGHT TEXT */
.profile{
    display:flex;
    align-items:center;
    gap:50px;
    flex-wrap:wrap;
}

/* BIG LEFT IMAGE */
.main-image{
    width:500px;
    height:600px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* TEXT SIDE */
.text{
    flex:1;
    min-width:300px;
    font-size:24px;
    line-height:1.6;
}

h2{
    margin-top:30px;
    font-size:32px;
    color:#444;
}

/* GAMES */
.games{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    margin-top:20px;
}

.game-card{
    background:#f5f5f5;
    padding:15px;
    border-radius:15px;
    text-align:center;
    width:220px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.game-card:hover{
    transform:scale(1.05);
}

/* BUTTON STYLE */
.game-button{
    display:inline-block;
    padding:6px 12px;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    font-size:14px;
    cursor:pointer;
    text-decoration:none;
}

.game-button:hover{
    background:#45a049;
}

</style>
</head>
